# configs/fmnist_10clients.yaml
# Experiment: FMNIST with 10 clients (quick run)

experiment:
  name: "SecureFedPROM_FMNIST_10clients"
  dataset: "fmnist"
  num_clients: 10
  num_rounds: 50
  clients_per_round: 5
  budget: 50.0

fedavg_baseline:
  algorithm: "FedAvg"
  client_fraction: 0.5
  local_epochs: 5
  batch_size: 32
  optimizer: "SGD"
  momentum: 0.9
  lr: 0.01
  loss: "CrossEntropyLoss"

data:
  partitioning: "dirichlet"
  alpha_values: [0.01, 0.1, 0.5, 1.0, "IID"]
  seed: 42

strategies:
  - securefedprom
  - random
  - power_of_choice
  - greedy
  - resource_aware
  - price_first

securefedprom:
  abac_min_ram_gb: 2.0
  abac_min_storage_gb: 4.0
  abac_min_bandwidth: 5.0
  abac_min_trust: 0.4
  promethee_q: 0.01
  promethee_p: 0.5
  weights:
    H: 0.25   # hardware
    N: 0.25   # network
    Q: 0.25   # data quality
    T: 0.25   # trust

evaluation:
  target_accuracy: 80.0
  report_toa_thresholds: [50, 60, 70]
  plot_dpi: 300
  plot_format: "png"
